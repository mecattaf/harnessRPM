name: Build packages

on:
  workflow_dispatch:
  push:
    paths:
      - '**/*.spec'
      - '.copr/**'
      - '.github/**'

jobs:
  main:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[build-all]') ||
      contains(github.event.head_commit.message, '[build-go]') ||
      contains(github.event.head_commit.message, '[build-rust]') ||
      contains(github.event.head_commit.message, '[build-gcc]') ||
      contains(github.event.head_commit.message, '[build-themes]') ||
      contains(github.event.head_commit.message, '[build-prebuilt]') ||
      contains(github.event.head_commit.message, '[build-kitty]')
    runs-on: ubuntu-latest
    container:
      image: 'registry.fedoraproject.org/fedora-minimal:latest'

    steps:
      - name: Prepare
        run: |
          microdnf -y install --nodocs --setopt=install_weak_deps=0 \
            copr-cli parallel tar gzip git

      - name: Copr config
        env:
          COPR_CONF: ${{ secrets.COPR_CONFIG }}
        run: |
          mkdir -p ~/.config
          echo "$COPR_CONF" > ~/.config/copr

      - uses: actions/checkout@v4

      # Build xcur2png first (dependency for nwg-look)
      - name: Build xcur2png (dependency)
        if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[build-all]') || contains(github.event.head_commit.message, '[build-go]')
        run: |
          xcur2png_build_id=$(copr-cli build-package mecattaf/harnessRPM --nowait --name xcur2png 2>/dev/null | grep -o 'builds: [0-9]*' | cut -d' ' -f2 || echo "0")
          echo "XCUR2PNG_BUILD_ID=$xcur2png_build_id" >> $GITHUB_ENV

      # Build Go packages (nwg-look depends on xcur2png, cliphist is standalone)
      - name: Build Go packages
        if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[build-all]') || contains(github.event.head_commit.message, '[build-go]')
        run: |
          copr-cli build-package mecattaf/harnessRPM --nowait --name cliphist 2>/dev/null || true
          if [ "$XCUR2PNG_BUILD_ID" != "0" ]; then
            copr-cli build-package mecattaf/harnessRPM --nowait --name nwg-look --after-build-id "$XCUR2PNG_BUILD_ID" 2>/dev/null || true
          else
            copr-cli build-package mecattaf/harnessRPM --nowait --name nwg-look 2>/dev/null || true
          fi

      # Build GCC packages (cpptrace first, then quickshell packages depend on it)
      - name: Build GCC packages
        if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[build-all]') || contains(github.event.head_commit.message, '[build-gcc]')
        run: |
          copr-cli build-package mecattaf/harnessRPM --nowait --name lisgd 2>/dev/null || true
          cpptrace_build_id=$(copr-cli build-package mecattaf/harnessRPM --nowait --name cpptrace 2>/dev/null | grep -o 'builds: [0-9]*' | cut -d' ' -f2 || echo "0")
          after_args=""
          if [ "$cpptrace_build_id" != "0" ]; then
            after_args="--after-build-id $cpptrace_build_id"
          fi
          copr-cli build-package mecattaf/harnessRPM --nowait --name quickshell-git $after_args 2>/dev/null || true
          copr-cli build-package mecattaf/harnessRPM --nowait --name quickshellX-git $after_args 2>/dev/null || true

      # Build Rust packages
      - name: Build Rust packages
        if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[build-all]') || contains(github.event.head_commit.message, '[build-rust]')
        run: |
          copr-cli build-package mecattaf/harnessRPM --nowait --name asr-rs 2>/dev/null || true
          copr-cli build-package mecattaf/harnessRPM --nowait --name shpool 2>/dev/null || true
          copr-cli build-package mecattaf/harnessRPM --nowait --name microsandbox 2>/dev/null || true
          copr-cli build-package mecattaf/harnessRPM --nowait --name wl-gammarelay-rs 2>/dev/null || true
          copr-cli build-package mecattaf/harnessRPM --nowait --name wl-clip-persist 2>/dev/null || true
          copr-cli build-package mecattaf/harnessRPM --nowait --name gws 2>/dev/null || true
          copr-cli build-package mecattaf/harnessRPM --nowait --name fgp-browser 2>/dev/null || true

      # Build kitty
      - name: Build kitty
        if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[build-all]') || contains(github.event.head_commit.message, '[build-kitty]')
        run: |
          copr-cli build-package mecattaf/harnessRPM --nowait --name kitty 2>/dev/null || true

      # Build theme packages
      - name: Build theme packages
        if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[build-all]') || contains(github.event.head_commit.message, '[build-themes]')
        run: |
          parallel copr-cli build-package mecattaf/harnessRPM --nowait --name ::: \
            bibata-cursor-themes mactahoe-oled 2>/dev/null || true

      # Build prebuilt packages
      - name: Build prebuilt packages
        if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[build-all]') || contains(github.event.head_commit.message, '[build-prebuilt]')
        run: |
          copr-cli build-package mecattaf/harnessRPM --nowait --name atuin 2>/dev/null || true
          copr-cli build-package mecattaf/harnessRPM --nowait --name eza 2>/dev/null || true
          copr-cli build-package mecattaf/harnessRPM --nowait --name starship 2>/dev/null || true
          copr-cli build-package mecattaf/harnessRPM --nowait --name pi 2>/dev/null || true
          copr-cli build-package mecattaf/harnessRPM --nowait --name cliamp 2>/dev/null || true

      # Check build status
      - name: Check build status
        if: always()
        run: |
          sleep 60
          echo "=== Build Status Summary ==="
          copr-cli list-builds mecattaf/harnessRPM --output-format text-row | head -30
